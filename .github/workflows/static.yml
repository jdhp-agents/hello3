# Workflow for deploying static content to GitHub Pages (one subdirectory per branch)
name: Deploy static content to Pages

on:
  # Runs on pushes targeting any branch
  push:
    branches: ["**"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Allow writing to the gh-pages branch
permissions:
  contents: write

# One concurrent deployment per branch; cancel in-progress runs for the same branch
concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute safe branch name
        id: branch
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          # Replace any character that is not alphanumeric, dot, or hyphen with a hyphen
          SAFE_BRANCH="$(echo "$BRANCH" | sed 's/[^a-zA-Z0-9._-]/-/g')"
          echo "safe_name=$SAFE_BRANCH" >> "$GITHUB_OUTPUT"
          echo "Deploying branch '$BRANCH' to subdirectory '$SAFE_BRANCH'"

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: .
          target-folder: ${{ steps.branch.outputs.safe_name }}
          # Only clean the target subdirectory, not the rest of gh-pages
          clean: true
          clean-exclude: |
            .nojekyll
